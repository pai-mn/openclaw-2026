  origin:
    title: The Origins and Development of AI
    quote: |-
      "Can machines think?"
    eras:
      0:
        title: Birth Era
        desc: Dartmouth Conference establishes AI as an academic field, early achievements like Logic Theorist and checkers program
      1:
        title: Ups and Downs
        desc: From first AI winter to expert systems rise, AI sees renewed interest in specific industries
      2:
        title: Transition Era
        desc: Deep Blue defeats Kasparov, research shifts from rule-based to data-driven statistical learning
      3:
        title: Deep Learning Era
        desc: ImageNet and AlphaGo breakthroughs, CNN and reinforcement learning open new era
      4:
        title: LLM Era
        desc: Transformer architecture and ChatGPT launch, AI evolves from perception to generation
  agent:
    title: The Dawn of the (Truly Usable) Agent Era
    intro: |-
      The timing is right, it's fate and destiny, the moment creates the hero. Even without the lobster, other "arthropods" would likely emerge.
    openclaw:
      title: 'OpenClaw: The Puzzle'
      pieces:
        - number: First Piece
          title: Powerful Language Model
          content: Claude Sonnet 4.5+
          short: LLM ✨
          color: '#ff6b6b'
        - number: Second Piece
          title: Basic Tools
          content: Bash
          short: Bash
          color: '#ffa502'
        - number: Third Piece
          title: MCP/Skills
          content: Model Context Protocol & Skills Ecosystem
          short: MCP/Skills
          color: '#20bf6b'
      result: When these three critical pieces click together perfectly, OpenClaw emerges, and the era of truly usable AI agents begins.
    reality:
      title: What's OpenClaw Really Like?
      subtitle: A usable system with a bunch of "issues" | ✨ It works, sometimes remarkably well ✨
      issues:
        - title: Poor Performance
          icon: Zap
          desc: Long runtimes and complex context management lead to response delays
        - title: Extremely Complex Configuration
          icon: Settings
          desc: Multi-layered config files, environment variables, and channel settings intimidate newcomers
        - title: Serious Security Concerns
          icon: Lock
          desc: Tool permissions, sandbox escapes, and code execution risks require careful handling
        - title: Rapidly Growing Unreviewed Code
          icon: Package
          desc: Skills ecosystem lacks unified standards and quality review mechanisms
        - title: Very Token-Intensive
          icon: DollarSign
          desc: Long contexts, multi-turn conversations, and skill loading drive costs up quickly
        - title: Heavily Hyped
          icon: Megaphone
          desc: Gap between market expectations and actual capabilities requires realistic perspective
  events:
    alexnet: >-
      In 2012, AlexNet won the ImageNet competition with a 15.3% error rate,
      beating the second place by nearly 10 percentage points,
      proving deep learning could outperform traditional methods on large-scale image recognition tasks
    alphago: >-
      In 2016, AlphaGo defeated world Go champion Lee Sedol 4-1,
      with Move 37 shocking the Go world,
      marking AI's breakthrough in complex strategy games
    transformer: >-
      In 2017, Google published the paper 'Attention Is All You Need',
      introducing the Transformer architecture based entirely on attention mechanisms,
      becoming the foundation for all large language models
    alphafold: >-
      In 2020, DeepMind's AlphaFold solved the 50-year protein folding problem in biology,
      accurately predicting protein 3D structures within days
    chatgpt: >-
      On November 30, 2022, OpenAI launched ChatGPT based on GPT-3.5,
      reaching 1 million users in 5 days and 100 million in 2 months,
      becoming the fastest-growing consumer application
    mcp: >-
      On November 25, 2024, Anthropic released MCP (Model Context Protocol),
      a USB interface standard for AI systems,
      unifying how AI connects to data sources
    deepseek: >-
      In January 2025, Chinese DeepSeek released the R1 reasoning model,
      achieving comparable reasoning to OpenAI o1 at extremely low cost,
      proving AI can be democratized
    sonnet4: >-
      On May 23, 2025, Anthropic released Claude Sonnet 4,
      with significant improvements in reasoning and coding capabilities,
      marking a quantitative change in foundation models
    sonnet45: >-
      On September 30, 2025, Claude Sonnet 4.5 was released,
      achieving qualitative leap in complex reasoning tasks
    agent: >-
      On October 16, 2025, Anthropic launched Agent Skills,
      enabling Claude to use tools to execute complex tasks,
      giving AI agents wings
    openclaw: >-
      On November 24, 2025, OpenClaw made its first Git Commit,
      beginning the journey to build an AI Agent framework

