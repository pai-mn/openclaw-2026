    readMoreDesc: Deep dive into Claude Code's working principles and best practices

ai-agent-and-us:
  title: AI Agent and Us
  subtitle: What do we talk about when we talk about AI
  topics:
    - title: 'Wittgenstein: The Limits of Language'
      author: Ludwig Wittgenstein
      year: '1921-11'
      quote: The limits of my language mean the limits of my world. Language games determine how meaning is produced. When we make AI understand language, are we making it understand the world?
      tags: ['Philosophy', 'Language']
      link: 'https://www.gutenberg.org/ebooks/5740'

    - title: The Bitter Lesson
      author: Rich Sutton
      year: '2019-03-13'
      quote: 70 years of AI research teaches us that general methods leveraging computation ultimately beat human knowledge. We should stop trying to hard-code human knowledge into systems and instead build general methods that discover knowledge through search and learning.
      tags: ['Methodology', 'AI History']
      link: 'http://www.incompleteideas.net/IncIdeas/BitterLesson.html'

    - title: Zhuangzi's Free and Easy Wandering
      author: Zhuangzi
      quote: The great Peng bird rises ninety thousand li on the wind. When humans harness AI - skillfully borrowing external tools, riding the formless wind - can we also soar upward? This human-AI collaboration may be the free wandering of our age.
      tags: ['Philosophy', 'Human-AI Collaboration']

    - title: First Principles Thinking
      author: Elon Musk / Ancient Greek Philosophy
      quote: Think about problems at the most fundamental level. But in the AI age, when we use AI to solve problems without understanding first principles, we can only stay on the surface. Yet—do we really need to grasp the essence? Or is the surface enough?
      tags: ['Thinking Method', 'Philosophy']

    - title: Photoelectric Effect and Quantum Leap
      author: Albert Einstein
      year: '1905'
      quote: The photoelectric effect teaches us that light's frequency determines whether electrons are emitted, while intensity only determines quantity. Human capability is frequency, AI is intensity. Without sufficient frequency (fundamental skills, thinking ability), humans may become the constraint that holds AI back.
      tags: ['Physics Analogy', 'Human-AI Collaboration']

    - title: Least Squares and GPT
      author: Mathematical Principle
      quote: Least squares finds the best-fit curve; GPT finds the best next word by maximizing likelihood. Both are essentially searching for optimal solutions in high-dimensional spaces, except GPT's space has unprecedented scale.
      tags: ['Mathematics', 'Technical Principle']

    - title: 'Entropy and Intelligence: Intelligence as Compression'
      author: Information Theory Perspective
      quote: Shannon's information entropy theory suggests intelligence is essentially compression of the world. Language models compress information by learning data distributions - stronger prediction ability means higher compression rate and higher intelligence.
      tags: ['Information Theory', 'Nature of Intelligence']
      link: 'https://arxiv.org/abs/2407.06645'

    - title: 'Martin Fowler: AI Reshaping Software'
      author: Martin Fowler
      year: '2024'
      quote: >
        AI allows programmers to no longer write code manually, but AI hallucinations, unpredictable behavior, and debugging difficulties introduce system uncertainty. Is Agentic Engineering the silver bullet for software development?
        Where has the complexity shifted—to prompt engineering, code comprehension, architecture design, or intent alignment?
      tags: ['Software Engineering', 'Industry Transformation']

    - title: UI is PreAI
      author: Industry Perspective
      year: '2025'
      quote: Traditional UI is designed for humans, but in the AI era, natural language may be the best interface.
      tags: ['UI/UX', 'Trend']

    - title: "Anthropic: AI's Impact on Labor Markets"
      author: Anthropic Research
      year: '2026-03-05'
      quote: The actual impact of AI on employment remains far below its theoretical potential and has not yet led to systemic increases in unemployment rates.
      tags: ['Labor', 'Industry']
      link: 'https://www.anthropic.com/research/labor-market-impacts'

    - title: Something Big Is Happening
      author: Matt Shumer
      year: '2026-02-09'
      quote: On February 9, 2026, a six-year AI industry veteran wrote - From GPT-4 to Claude Sonnet 4.5, from single models to multi-agent systems, from tool calling to autonomous action. Multiple signals indicate we're on the eve of an AI capability leap. This isn't prediction; it's what's already happening.
      tags: ['Trend', 'Prediction']
      link: 'https://shumer.dev/something-big-is-happening'

    - title: 'Language Models are Few-Shot Learners'
      author: OpenAI (GPT-3 Paper)
      year: '2020-05-28'
      quote: Large-scale language models demonstrate surprising few-shot learning capabilities. Without gradient updates or fine-tuning, models can complete various tasks through text interaction and examples alone.
      tags: ['Technical Insight', 'Few-Shot Learning']
      link: 'https://arxiv.org/abs/2005.14165'

    - title: The Law of Leaky Abstractions
      author: Joel Spolsky
      year: '2002-11-11'
      quote: All non-trivial abstractions leak to some degree. When we treat LLMs as an abstraction for "intelligence," what are its leaks? Are we over-relying on this abstraction? When abstractions leak—when AI fails, hallucinates, or loses control—what should we do?
      tags: ['Software Engineering', 'Abstraction']
      link: 'https://www.joelonsoftware.com/2002/11/11/the-law-of-leaky-abstractions/'

    - title: Tokens as Currency
      author: Conceptual Analogy
      quote: Tokens are the fundamental unit of measurement in the AI world. Just as monetary systems enable economic operation by quantifying value, Tokens construct AI economics by quantifying information - API calls are billed in Tokens, model capabilities measured by Token windows, making Tokens the value anchor connecting compute, data, and intelligence.
      tags: ['Economics', 'Concept']

    - title: 'Self-Driving Codebase'
      author: Background Agents / Modal
      year: '2026'
      quote: >
        Self-Driving Codebase means AI agents autonomously write, test, and deploy code. Ramp's background coding agent now writes over half of merged PRs. Modal's cloud sandboxes enable 50,000+ concurrent execution environments—secure, sub-second startup, dynamically defined. As agents take over execution, the bottleneck shifts to human: code review, approval, and coordination become the new constraints. Humans become the coordination layer, not the execution layer.
      tags: ['Infrastructure', 'Agent', 'Paradigm Shift', 'Sandbox']
      link: 'https://background-agents.com'

    - title: 'Andrew Ng: Agentic Workflow is Hugely Valuable'
      author: Andrew Ng
      year: '2024'
      quote: Acknowledge the value of scale, but reject scale mysticism; be optimistic about Agentic Workflow today, but face the unknowns on the path to AGI—reliability gaps, tool overload traps, and bubble warnings all demand vigilance.
      tags: ['Workflow', 'Agent']
      link: 'https://www.deeplearning.ai/the-batch/how-agents-can-improve-llm-performance/'

    - title: 'Sam Altman: From GDP Era to Extreme Abundance & Deflation'
      author: Sam Altman (OpenAI)
      year: '2026-02-20'
      quote: Nominal GDP becomes a defunct economic metric; society must reimagine institutions for "post-scarcity." AGI is within reach, and ASI is only years away.
      tags: ['Economics', 'AGI']
      link: 'https://www.youtube.com/watch?v=IiV9q73YUxI'

    - title: Bash is All You Need
      author: Thariq Shihipar (Anthropic)
      year: '2025'
      quote: Rather than designing thousands of specialized APIs for Agents, grant them terminal access. The combination of Bash and filesystem constitutes complete universal computing capability—this is both the core philosophy of OpenClaw architecture and perhaps explains why modern agentic coding tools widely adopt TUI (Terminal User Interface).
      tags: ['Technical Architecture', 'Agent']
      link: 'https://www.reddit.com/r/ClaudeAI/comments/1q4yig7/claude_agent_sdk_full_workshop_thariq_shihipar/'

    - title: 'Anthropic Development Process: Prompting is Work'
      author: Anthropic Team
      year: '2025'
      quote: Code is output; prompting is work. Our engineering team no longer writes traditional PRDs—directly converse with Claude, describe requirements, iterate designs, generate code, reducing idea-to-prototype time by 10x.
      tags: ['Development Process', 'Industry Practice']
      link: 'https://www.youtube.com/watch?v=julbw1JuAz0'

    - title: Prompts are Code, .md Files are State
      author: Mario Zechner
      year: '2025-06-02'
      quote: Treating prompts as code doesn't just change how we use AI, it makes AI outputs predictable and manageable. This return to a "programmer's mindset" allows us to regain control in the face of LLM uncertainty. TDD in the AI era returns to essence—prompts as specs, declarations as implementations.
      tags: ['Prompt Engineering', 'TDD', 'Methodology']
      link: 'https://mariozechner.at/posts/2025-06-02-prompts-are-code/'

    - title: 'AI-Centric: Data + Workflow'
      author: Industry Trend
      year: '2025'
      quote: Shift from data-centric to AI-centric. Not embedding AI into existing systems, but redesigning data architecture and workflows around AI. This is a paradigm shift.
      tags: ['Architecture', 'Paradigm Shift']

    - title: AI Status Report Based on 100 Trillion Tokens
      author: OpenRouter & a16z
      year: '2025-12'
      quote: Roleplay and Programming are the two most core, sticky domains for AI implementation in practice. Programming Tokens surged from 11% in early 2025 to over 50%.
      tags: ['Data', 'Current Analysis']
      link: 'https://openrouter.ai/state-of-ai'

    - title: Global Intelligence Crisis 2028
      author: Citrini Research (James van Geelen & Alap Shah)
      year: '2026-02-22'
      quote: On February 22, 2026, Citrini Research published - If AI develops at current pace, 2028 may see a global "intelligence crisis" with unemployment reaching 10.2% and S&P 500 crashing 38%. Massive knowledge work automation, social restructuring, humans needing to redefine work and value.
      tags: ['Future', 'Social Impact']
      link: 'https://www.citriniresearch.com/p/2028gic'

