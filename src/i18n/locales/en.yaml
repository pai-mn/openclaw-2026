principle:
  title: OpenClaw Principles
  subtitle: Deep understanding of how OpenClaw works
  sections:
    - title: System Architecture Overview
      desc: OpenClaw is a long-running runtime system with a local-first, self-hosted architecture.
      components:
        label: 'Core components include:'
        items:
          - name: Gateway
            desc: Control Plane
          - name: Agent Runtime
            desc: Execution Plane
          - name: Channel Adapters
            desc: Channel Adapters
          - name: Workspace
            desc: Workspace System
      color: '#20bf6b'
    - title: Agent Execution Loop
      desc: 'Agent implements a continuous stateful execution cycle: parse session → assemble context → invoke model → execute tools → persist state → loop. This design enables continuous learning and memory.'
      color: '#9775fa'
  architecture:
    philosophy:
      title: 'Core Design Philosophy: Bash is All You Need'
      intro: "Revolutionary insight from Anthropic engineer Thariq Shihipar in 'Claude Code SDK Workshop': Instead of defining thousands of custom APIs for Agents, give them two primitive Unix-era capabilities."
      bash:
        title: Bash (Ultimate Glue)
        composability: 'Composability: Connect millions of mature software via pipes'
        discoverability: 'Discoverability: Explore environment like humans'
      filesystem:
        title: File System (Long-term Memory)
        context: 'Context Engineering: Solution for ultra-long tasks'
        persistence: 'State Persistence: Progressive disclosure for massive projects'
      quote: 'Give an Agent a computer terminal, and it has the universal ability to solve digital world problems like humans.'
      author: Thariq Shihipar
    paradigm:
      title: 'Paradigm Shift: From Tool Calling to OS-level Autonomy'
      dimensions:
        flexibility: Flexibility
        security: Security
        efficiency: Efficiency
      traditional:
        flexibility: Developers must predefine every function
        security: Relies on API permission management
        efficiency: Single interaction for simple tasks
      newParadigm:
        flexibility: Agent writes scripts on-demand, composes existing tools
        security: Sandbox + Permissions + Audit (Swiss cheese defense)
        efficiency: Agent Loop completes long-horizon tasks
      tableHeaders:
        dimension: Dimension
        traditional: Traditional Tool Calling
        new: Bash & File System Paradigm
    diagram: System Architecture Diagram
