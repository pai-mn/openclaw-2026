  agent:
    title: （真正可用的）智能体时代的来临
    intro: |-
      时机到了，时也命也，时势造英雄。即使不出现龙虾，也可能出现其他"节肢动物"。
    openclaw:
      title: OpenClaw：拼图
      pieces:
        - number: 第一块
          title: 足够强大的大语言模型
          content: Claude Sonnet 4.5+
          short: LLM ✨
          color: '#ff6b6b'
        - number: 第二块
          title: 基础工具
          content: Bash
          short: Bash
          color: '#ffa502'
        - number: 第三块
          title: MCP/Skills
          content: MCP 协议与技能生态系统
          short: MCP/Skills
          color: '#20bf6b'
      result: 当这三块关键拼图完美咬合，OpenClaw 应运而生，真正可用的 AI 智能体时代就此开启。
    reality:
      title: OpenClaw 到底怎么样？
      subtitle: 一个可用，但有一堆"问题"的系统｜✨ 可以工作，有时候相当惊艳 ✨
      issues:
        - title: 性能很差
          icon: Zap
          desc: 长运行时和复杂的上下文管理导致响应延迟
        - title: 配置极为复杂
          icon: Settings
          desc: 多层配置文件、环境变量、渠道设置让新手望而却步
        - title: 严重的安全问题
          icon: Lock
          desc: 工具权限、沙箱逃逸、代码执行风险需要谨慎对待
        - title: 无人审查快速膨胀的代码
          icon: Package
          desc: 技能生态系统缺乏统一标准和质量审查机制
        - title: 非常消耗 Token
          icon: DollarSign
          desc: 长上下文、多轮对话、技能加载导致成本快速上升
        - title: 极度被炒作
          icon: Megaphone
          desc: 市场期望与实际能力存在差距，需要理性看待
  events:
    alexnet: >-
      2012年，AlexNet 在 ImageNet 竞赛中以15.3%的错误率夺冠，
      领先第二名近10个百分点，首次证明深度学习可以在大规模图像识别任务上超越传统方法，
      开启了深度学习革命
    alphago: >-
      2016年，AlphaGo 4:1战胜世界围棋冠军李世石，
      神的一手第37步震惊棋坛，标志着AI在复杂策略游戏领域的突破
    transformer: >-
      2017年，Google发布《Attention Is All You Need》论文，提出Transformer架构，
      完全基于注意力机制，无需循环和卷积，成为所有大语言模型的基础
    alphafold: >-
      2020年，DeepMind的AlphaFold解决了困扰生物学50年的蛋白质折叠问题，
      能够在数天内准确预测蛋白质三维结构
    chatgpt: >-
      2022年11月30日，OpenAI推出ChatGPT，基于GPT-3.5模型，
      5天用户破百万，两个月破亿，成为史上增长最快的消费级应用
    mcp: >-
      2024年11月25日，Anthropic发布MCP（模型上下文协议），
      作为AI系统的USB接口标准，统一AI与数据源的连接方式
    deepseek: >-
      2025年1月，中国DeepSeek发布R1推理模型，
      以极低成本实现了与OpenAI o1相当的推理能力，证明AI可以被民主化
    sonnet4: >-
      2025年5月23日，Anthropic发布Claude Sonnet 4，
      在推理能力、编码能力上显著提升，标志着基础模型的量变
    sonnet45: >-
      2025年9月30日，Claude Sonnet 4.5发布，
      在复杂推理任务上实现质的飞跃，引发AI能力的质变
    agent: >-
      2025年10月16日，Anthropic推出Agent Skills，
      让Claude能够使用工具执行复杂任务，为AI Agent插上翅膀
    openclaw: >-
      2025年11月24日，OpenClaw提交第一个Git Commit，
      开始了构建AI Agent框架的旅程

