principle:
  title: OpenClaw的原理
  subtitle: 深入理解 OpenClaw 的工作原理
  sections:
    - title: 系统架构概览
      desc: OpenClaw 是一个长运行时系统，采用本地优先、自托管的架构设计。
      components:
        label: 核心组件包括：
        items:
          - name: Gateway
            desc: 控制平面
          - name: Agent Runtime
            desc: 执行平面
          - name: Channel Adapters
            desc: 渠道适配器
          - name: Workspace
            desc: 工作空间系统
      color: '#20bf6b'
    - title: Agent 执行循环
      desc: >-
        Agent 实现连续的状态化执行循环：解析会话 → 组装上下文 → 调用模型 → 执行工具 → 持久化状态 → 循环继续。
        这种设计让 Agent 能够持续学习和记忆。
      color: '#9775fa'
  architecture:
    philosophy:
      title: 核心设计哲学：Bash is All You Need
      intro: 来自 Anthropic 工程师 Thariq Shihipar 在《Claude Code SDK Workshop》中提出的革命性观点：与其为 Agent 定义成千上万个定制化 API，不如直接赋予它 Unix 时代的两项原始能力。
      bash:
        title: Bash（终极胶水）
        composability: '组合性：通过管道连接百万级成熟软件'
        discoverability: '发现性：像人类一样探索环境'
      filesystem:
        title: 文件系统（长期记忆）
        context: '上下文工程：超长任务管理方案'
        persistence: '状态持久化：渐进式披露，处理巨型项目'
      quote: '给予 Agent 一个电脑终端，它就拥有了像人类一样解决数字世界问题的通用能力。'
      author: Thariq Shihipar
    paradigm:
      title: 范式转移：从工具调用到操作系统级自主
      dimensions:
        flexibility: 灵活性
        security: 安全性
        efficiency: 效率
      traditional:
        flexibility: 开发者必须预先定义好每个函数
        security: 依赖 API 权限管理
        efficiency: 单次交互完成简单任务
      newParadigm:
        flexibility: Agent 随用随写脚本，组合现有工具
        security: 沙盒 + 权限 + 审计（瑞士奶酪防御）
        efficiency: Agent Loop 完成长程任务
      tableHeaders:
        dimension: 维度
        traditional: 传统工具调用
        new: Bash & 文件系统范式
    diagram: 系统架构图
  agentLoop:
    pseudocode: 伪代码示例
    simpleDiagram: 简化流程图
    completeDiagram: 完整执行流程
    readMore: 拓展资料
    readMoreDesc: 深入了解 Claude Code 的工作原理与最佳实践

ai-agent-and-us:
  title: AI Agent与我们
  subtitle: 当我们谈论AI时，我们在谈论什么
  topics:
    - title: 维特根斯坦：语言的边界
      author: Ludwig Wittgenstein
      year: '1921-11'
      quote: 我的语言的界限意味着我的世界的界限。语言游戏决定了意义的产生方式。当我们让AI理解语言，我们是在让它理解世界吗？
      tags: ['哲学', '语言']
      link: 'https://www.gutenberg.org/ebooks/5740'

    - title: 苦涩的教训
      author: Rich Sutton
      year: '2019-03-13'
      quote: 70年AI研究史告诉我们：利用计算的通用方法最终胜过人类知识。我们应该停止试图将人类知识硬编码进系统，转而构建能够通过搜索和学习发现知识的通用方法。
      tags: ['方法论', 'AI历史']
      link: 'http://www.incompleteideas.net/IncIdeas/BitterLesson.html'

    - title: 逍遥游
      author: 庄子
      quote: 大鹏水击三千里，抟扶摇而上者九万里。人借助AI，善假于物，凭虚御风，是否也能扶摇直上？这种人机协同，或许就是当代的逍遥游。
      tags: ['哲学', '人机协同']

    - title: 第一性原理
      author: Elon Musk / 古希腊哲学
      quote: 回到事物最基本的层面思考问题。但在AI时代，当我们用AI解决问题时，不懂第一性原理就只能停留在表面。然而——我们真的需要抓住精髓吗？还是表面就已足够？
      tags: ['思维方法', '哲学']

    - title: 光电效应与量子跃迁
      author: Albert Einstein
      year: '1905'
      quote: 光电效应告诉我们：光的频率决定能否激发电子，强度只决定数量。人的能力是频率，AI是强度。如果人本身没有足够的频率（基础能力、思考力），人或许会成为掣肘AI的限制。
      tags: ['物理类比', '人机协同']

    - title: 最小二乘法与GPT
      author: 数学原理
      quote: 最小二乘法寻找最佳拟合曲线，GPT通过最大化似然寻找最佳的下一个词。两者本质都是在高维空间中寻找最优解，只是GPT的空间维度达到了前所未有的规模。
      tags: ['数学', '技术原理']

    - title: 熵与智能：智能即压缩
      author: 信息论视角
      quote: Shannon的信息熵理论暗示：智能本质上是对世界的压缩。语言模型通过学习数据分布来压缩信息，预测能力越强，压缩率越高，智能程度越高。
      tags: ['信息论', '智能本质']
      link: 'https://arxiv.org/abs/2407.06645'

    - title: Martin Fowler：AI重塑软件
      author: Martin Fowler
      year: '2024'
      quote: >
        AI让程序员不再需要手工编码，但AI幻觉、行为不可预测、调试困难等问题导致系统不确定性增加。Agentic Engineering是软件开发的银弹吗？
        复杂度被转移到了哪里——提示工程、代码理解、架构设计，还是意图对齐？
      tags: ['软件工程', '产业变革']

    - title: UI is PreAI
      author: 行业观点
      year: '2026'
      quote: 传统UI是为人类设计的接口，但在AI时代，自然语言或许是最好的接口。
      tags: ['UI/UX', '趋势']

    - title: Anthropic：AI对劳动力市场的影响
      author: Anthropic Research
      year: '2026-03-05'
      quote: AI对就业的实际影响仍远低于其理论潜力，且尚未导致系统性的失业率上升。
      tags: ['劳动力', '产业']
      link: 'https://www.anthropic.com/research/labor-market-impacts'

    - title: 大的要来了
      author: Matt Shumer
      year: '2026-02-09'
      quote: 2026年2月9日，一位身处AI行业六年的从业者写道：从GPT-4到Claude Sonnet 4.5，从单一模型到多Agent系统，从工具调用到自主行动。多个信号表明：我们正处于AI能力跃迁的前夜。这不是预测，而是已经发生的事实。
      tags: ['趋势', '预测']
      link: 'https://shumer.dev/something-big-is-happening'

    - title: 语言模型：见微知著的学习者
      author: OpenAI (GPT-3论文)
      year: '2020-05-28'
      quote: 大规模语言模型展现出令人惊讶的少样本学习能力。在没有梯度更新或微调的情况下，仅通过文本交互和示例，模型就能完成各种任务。
      tags: ['技术洞察', 'Few-Shot Learning']
      link: 'https://arxiv.org/abs/2005.14165'

    - title: 抽象泄漏法则
      author: Joel Spolsky
      year: '2002-11-11'
      quote: 所有重大的抽象机制在某种程度上都会泄漏。当我们把LLM当作"智能"的抽象时，它的漏洞是什么？我们是否过度依赖这个抽象？当抽象泄漏时——当AI出错、幻觉、失控时——我们该怎么办？
      tags: ['软件工程', '抽象']
      link: 'https://www.joelonsoftware.com/2002/11/11/the-law-of-leaky-abstractions/'

    - title: Tokens与货币
      author: 概念类比
      quote: Tokens是AI世界的基础计量单位。正如货币体系通过量化价值实现经济运转，Tokens通过量化信息构建了AI经济学：API调用以Tokens计费，模型能力以Token窗口度量，Tokens成为连接算力、数据与智能的价值锚点。
      tags: ['经济学', '概念']

    - title: '自驱动的代码库'
      author: 后台 Agents / Modal
      year: '2026'
      quote: >
        自驱动的代码库意味着 AI Agent 自主编写、测试和部署代码。Ramp 的后台编程 Agent 目前已编写超过一半的合并 PR。Modal 的云端沙箱支持 50,000+ 并发执行环境——安全、亚秒级启动、动态定义。当 Agent 接管执行后，瓶颈转向人类：代码审查、批准和协调成为新的约束。人类成为协调层，而非执行层。
      tags: ['基础设施', 'Agent', '范式转变', '沙箱']
      link: 'https://background-agents.com'

    - title: 吴恩达：Agentic Workflow价值巨大
      author: Andrew Ng
      year: '2024'
      quote: 承认规模的价值，但拒绝规模的迷信；看好Agentic Workflow的当下，但正视通往AGI路径上的未知——可靠性缺口、工具过载陷阱、泡沫警告，皆需警惕。
      tags: ['工作流', 'Agent']
      link: 'https://www.deeplearning.ai/the-batch/how-agents-can-improve-llm-performance/'

    - title: 山姆·奥特曼：从GDP时代迈向极度丰裕与通缩
      author: Sam Altman (OpenAI)
      year: '2026-02-20'
      quote: 名义GDP成为失效的经济指标，社会需重新构想"非稀缺"的制度。AGI已近在咫尺，而ASI仅剩几年之遥。
      tags: ['经济', 'AGI']
      link: 'https://www.youtube.com/watch?v=IiV9q73YUxI'

    - title: Bash is All You Need
      author: Thariq Shihipar (Anthropic)
      year: '2026'
      quote: 与其为Agent设计成千上万个专用API，不如赋予其终端访问能力。Bash与文件系统的组合即可构成完备的通用计算能力——这既是OpenClaw架构的核心哲学，或许也解释了当今Agent类编程工具广泛采用TUI的深层原因。
      tags: ['技术架构', 'Agent']
      link: 'https://www.reddit.com/r/ClaudeAI/comments/1q4yig7/claude_agent_sdk_full_workshop_thariq_shihipar/'

    - title: Anthropic开发流程：提示词即工作
      author: Anthropic Team
      year: '2026'
      quote: 代码是输出，提示词才是工作。我们的工程团队不再写传统PRD，直接与Claude对话描述需求、迭代设计、生成代码，从想法到原型缩短10倍。
      tags: ['开发流程', '产业实践']
      link: 'https://www.youtube.com/watch?v=julbw1JuAz0'

    - title: 提示词即代码，.md 文件即状态
      author: Mario Zechner
      year: '2025-06-02'
      quote: 将提示词视为代码，不仅改变了使用 AI 的方式，也让 AI 的输出变得可预测和可管理。这种“程序员思维”的回归，让我们在面对 LLM 的不确定性时，重新夺回了控制权。AI 时代的 TDD 回归本质：描述结果即规格，提示词即实现——“撒豆成兵”、“言出法随”。
      tags: ['提示词工程', 'TDD', '方法论']
      link: 'https://mariozechner.at/posts/2025-06-02-prompts-are-code/'

    - title: 以AI为中心：数据+工作流
      author: 行业趋势
      year: '2026'
      quote: 从以数据为中心到以AI为中心的转变。不是把AI嵌入现有系统，而是围绕AI重新设计数据架构和工作流。这是范式转移。
      tags: ['架构', '范式转移']

    - title: 基于100万亿Tokens数据的AI现状报告
      author: OpenRouter & a16z
      year: '2025-12'
      quote: 角色扮演（Roleplay）和代码编写是目前AI落地最核心、粘性最高的两大实战领域。代码编写的Tokens占比从2025年初的11%飙升至50%+。
      tags: ['数据', '现状分析']
      link: 'https://openrouter.ai/state-of-ai'

    - title: 2028全球智能危机
      author: Citrini Research (James van Geelen & Alap Shah)
      year: '2026-02-22'
      quote: 2026年2月22日，Citrini Research发布报告：如果AI以当前速度发展，2028年可能出现全球性的"智能危机"——失业率达10.2%，标普500暴跌38%。大量知识工作被自动化，社会结构面临重组，人类需要重新定义工作和价值。
      tags: ['未来', '社会影响']
      link: 'https://www.citriniresearch.com/p/2028gic'

