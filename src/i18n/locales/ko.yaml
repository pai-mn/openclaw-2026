puzzle:
  title: OpenClaw의 탄생
  subtitle: ''
  timelineIntro: 최근 사건
  timelineTitle:
    alexnet: AlexNet
    alphago: AlphaGo
    transformer: Transformer
    alphafold: AlphaFold
    chatgpt: ChatGPT 3.5
    mcp: MCP 프로토콜
    deepseek: DeepSeek R1
    sonnet4: Claude Sonnet 4
    sonnet45: Claude Sonnet 4.5
    agent: Agent Skills
    openclaw: OpenClaw 탄생
  timelineDesc:
    alexnet: 딥러닝 혁명
    alphago: |-
      "신"이 떨어지다
    transformer: 창조의 청사진
    alphafold: AI 과학자
    chatgpt: |-
      "아이폰 모멘트"
    mcp: |-
      "USB 인터페이스"
    deepseek: |-
      저렴한 "연금술"
    sonnet4: 양적 변화
    sonnet45: 질적 변화
    agent: 날개를 달다
    openclaw: 이륙
  origin:
    title: 인공지능의 기원과 발전
    quote: |-
      "기계는 생각할 수 있는가?"
    eras:
      0:
        title: 탄생기
        desc: 다트머스 회의에서 AI를 학술 분야로 확립, 논리 이론가, 체커 프로그램 등 초기 성과
      1:
        title: 기복기
        desc: 첫 번째 AI 겨울부터 전문가 시스템 부상까지, 특정 산업 분야에서 AI가 다시 주목받음
      2:
        title: 전환기
        desc: Deep Blue가 카스파로프를 물리치고, 연구가 규칙 기반에서 데이터 기반 통계 학습으로 전환
      3:
        title: 딥러닝 시대
        desc: ImageNet과 AlphaGo의 돌파구, CNN과 강화 학습이 새로운 시대를 열음
      4:
        title: 대형 언어 모델 시대
        desc: Transformer 아키텍처와 ChatGPT 출시, AI가 인지에서 생성으로 진화
  agent:
    title: (진정으로 사용 가능한) 에이전트 시대의 여명
    intro: |-
      때가 무르익었고, 그것은 운��이며, 시대가 영웅을 만들어냅니다. 가재가 나타나지 않았더라도 다른 "절지동물"이 나타났을 것입니다.
    openclaw:
      title: 'OpenClaw: 퍼즐'
      pieces:
        - number: 첫 번째 조각
          title: 강력한 언어 모델
          content: Claude Sonnet 4.5+
          short: LLM ✨
          color: '#ff6b6b'
        - number: 두 번째 조각
          title: 기본 도구
          content: Bash
          short: Bash
          color: '#ffa502'
        - number: 세 번째 조각
          title: MCP 프로토콜
          content: Model Context Protocol
          short: MCP
          color: '#20bf6b'
        - number: 네 번째 조각
          title: 스킬 생태계
          content: Skills Ecosystem
          short: Skills
          color: '#06b6d4'
      result: 이 네 가지 핵심 조각이 완벽하게 맞물릴 때, OpenClaw가 탄생하고 진정으로 사용 가능한 AI 에이전트 시대가 시작됩니다.
    reality:
      title: OpenClaw는 실제로 어떤가요?
      subtitle: 사용 가능하지만 여러 "문제"가 있는 시스템 | ✨ 작동하며, 때로는 상당히 인상적입니다 ✨
      issues:
        - title: 성능이 매우 낮음
          icon: Zap
          desc: 긴 실행 시간과 복잡한 컨텍스트 관리로 인해 응답 지연 발생
        - title: 구성이 극도로 복잡함
          icon: Settings
          desc: 다층 구성 파일, 환경 변수, 채널 설정이 초보자를 압도함
        - title: 심각한 보안 문제
          icon: Lock
          desc: 도구 권한, 샌드박스 탈출, 코드 실행 위험에 신중한 처리 필요
        - title: 검토되지 않은 빠르게 팽창하는 코드
          icon: Package
          desc: 스킬 생태계에 통일된 표준과 품질 검토 메커니즘 부족
        - title: 토큰 소비가 매우 많음
          icon: DollarSign
          desc: 긴 컨텍스트, 다중 턴 대화, 스킬 로딩으로 비용이 빠르게 증가
        - title: 과도하게 과대평가됨
          icon: Megaphone
          desc: 시장 기대와 실제 능력 간의 격차, 현실적인 관점 필요
  events:
    alexnet: >-
      2012년 AlexNet이 ImageNet 대회서 15.3% 오류율로 1위를 하며 2위를 약 10포인트 앞서
      대규모 이미지 인식 작업에서 딥러닝이 전통적인 방법을 뛰어날 수 있음을 최초로 증명하고
      딥러닝 혁명의 시대를 열었습니다
    alphago: >-
      2016년 AlphaGo가 세계 바둑 챔피언 이세돌을 4:1로 꺾으며
      37번째 수가 바둑계를 경악시키고 AI의 복잡한 전략 게임 분야 돌파구를 표시합니다
    transformer: >-
      2017년 Google이 Attention Is All You Need 논문을 발표하고
      어텐션 메커니즘만으로 순환과 컨볼루션을 완전히 탈피한 Transformer 아키텍처를 제안,
      모든 대규모 언어 모델의 기초가 되었습니다
    alphafold: >-
      2020년 DeepMind의 AlphaFold가 생물학의 50년 된 단백질 접기 문제를 해결하고
      며칠 내에 정확한 단백질 3D 구조를 예측할 수 있게 되었습니다
    chatgpt: >-
      2022년 11월 30일 OpenAI가 GPT-3.5 기반 ChatGPT를 출시,
      5일 만에 100만 명, 2개월 만에 1억 명의 사용자를 확보하며
      역사상 가장 빠르게 성장한 소비자 앱이 되었습니다
    mcp: >-
      2024년 11월 25일 Anthropic이 MCP(모델 컨텍스트 프로토콜)를 발표,
      AI 시스템의 USB 인터페이스 표준으로 AI가 데이터 소스에 연결되는 방식을 통일합니다
    deepseek: >-
      2025년 1월 중국 DeepSeek이 R1 추론 모델을 발표,
      극低成本으로 OpenAI o1에 필적하는 추론 능력을 달성하고
      AI의 민주화 가능성을 입증합니다
    sonnet4: >-
      2025년 5월 23일 Anthropic이 Claude Sonnet 4를 출시,
      추론 및 코딩 능력이 크게 향상되어 기초 모델의 양적 변화를 보였습니다
    sonnet45: >-
      2025년 9월 30일 Claude Sonnet 4.5 출시,
      복잡한 추론 작업에서 질적 도약을 달성했습니다
    agent: >-
      2025년 10월 16일 Anthropic이 Agent Skills를 출시,
      Claude가 도구를 사용하여 복잡한 작업을 실행할 수 있게 하여
      AI 에이전트에 날개를 달아줍니다
    openclaw: >-
      2025년 11월 24일 OpenClaw이 첫 번째 Git 커밋을 제출하고
      AI 에이전트 프레임워크 구축 여정을 시작합니다

