  features:
    - title: '다중 채널 통신: 상호작용 혁신'
      desc: '혁신점: 새로운 도구를 배울 필요 없이 IM 앱에서 직접 AI를 제어합니다. 여러 IM 플랫폼을 지원하며, 휴대폰으로 직접 대화할 수 있습니다'
    - title: '능력 경계: 풍부한 도구 액세스'
      desc: >-
        브라우저 자동화, 시스템 명령 실행, 파일 시스템 작업,
        카메라/화면 녹화, 알림, 위치 서비스
    - title: '연중무휴: 자율 행동'
      desc: 'AI가 사람의 개입 없이 자율적으로 작업합니다. 예약된 작업이 자동으로 실행되고, 외부 이벤트에 능동적으로 응답하며, 백그라운드에서 지속적으로 실행되는 진정한 24시간 지능형 어시스턴트'
    - title: '가재 키우기: 자체 반복'
      desc: 'AI가 자율적으로 코드를 수정하고, 새로운 스킬을 생성하며, 시스템 구성을 최적화합니다. 3계층 메모리 시스템(작업 메모리, 단기 메모리, 장기 메모리)을 통해 AI가 사용자의 선호도와 습관을 진정으로 기억하여 개인화된 지능형 비서를 형성합니다. ClawHub를 통해 커뮤니티 스킬을 획득하고 지속적으로 학습하고 진화합니다'
    - title: '추가 기능, 또는 다른 Claw'
      desc: 'MCP 프로토콜 생태계(USB와 같은 표준화된 인터페이스로 방대한 서비스 연결), 10,700개 이상의 커뮤니티 스킬, 로컬 우선 아키텍처, 5계층 보안 방어, 멀티 에이전트 시스템, 자체 호스팅 배포 등'

principle:
  title: OpenClaw 원리
  subtitle: OpenClaw 작동 방식 깊이 이해하기
  sections:
    - title: 시스템 아키텍처 개요
      desc: OpenClaw는 장기 실행 런타임 시스템으로, 로컬 우선, 자체 호스팅 아키텍처로 설계되었습니다.
      components:
        label: '핵심 구성 요소에는 다음이 포함됩니다:'
        items:
          - name: Gateway
            desc: 제어 평면
          - name: Agent Runtime
            desc: 실행 평면
          - name: Channel Adapters
            desc: 채널 어댑터
          - name: Workspace
            desc: 작업 공간 시스템
      color: '#20bf6b'
    - title: Agent 실행 루프
      desc: >-
        Agent는 연속된 상태 실행 사이클을 구현합니다:
        세션 분석 → 컨텍스트 조립 → 모델 호출 → 도구 실행 → 상태 저장 → 루프 계속.
        이 설계로 지속적인 학습과 기억이 가능합니다.
      color: '#9775fa'
  architecture:
    philosophy:
      title: '핵심 설계 철학: Bash is All You Need'
      intro: 'Anthropic 엔지니어 Thariq Shihipar가 《Claude Agent SDK Workshop》에서 제시한 혁명적 관점: Agent를 위해 수천 개의 맞춤형 API를 정의하는 대신, Unix 시대의 두 가지 원시 능력을 부여합니다.'
      bash:
        title: Bash（궁극의 접착제）
        composability: '조합성: 파이프를 통해 수백만 개의 성숙한 소프트웨어 연결'
        discoverability: '발견성: 인간처럼 환경 탐색'
      filesystem:
        title: 파일 시스템（장기 기억）
        context: '컨텍스트 엔지니어링: 초장기 작업 관리 솔루션'
        persistence: '상태 지속성: 점진적 공개, 대규모 프로젝트 처리'
      quote: 'Agent에게 컴퓨터 터미널을 주면, 인간처럼 디지털 세계의 문제를 해결할 수 있는 보편적 능력을 갖게 됩니다.'
      author: Thariq Shihipar
    paradigm:
      title: '패러다임 전환: 도구 호출에서 OS 레벨 자율성으로'
      dimensions:
        flexibility: 유연성
        security: 보안
        efficiency: 효율성
      traditional:
        flexibility: 개발자가 모든 함수를 미리 정의해야 함
        security: API 권한 관리에 의존
        efficiency: 단일 상호작용으로 간단한 작업 완료
      newParadigm:
        flexibility: Agent가 필요에 따라 스크립트 작성, 기존 도구 조합
        security: 샌드박스 + 권한 + 감사（스위스 치즈 방어）
        efficiency: Agent Loop로 장기 작업 완료
      tableHeaders:
        dimension: 차원
        traditional: 전통적 도구 호출
        new: Bash & 파일 시스템 패러다임
    diagram: 시스템 아키텍처 다이어그램
  agentLoop:
