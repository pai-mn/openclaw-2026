ai-agent-and-us:
  title: AI Agent와 우리
  subtitle: AI에 대해 이야기할 때 우리는 무엇에 대해 이야기하는가
  topics:
    - title: '비트겐슈타인: 언어의 경계'
      author: Ludwig Wittgenstein
      quote: 내 언어의 한계는 내 세계의 한계를 의미합니다. 언어 게임은 의미가 생성되는 방식을 결정합니다. AI가 언어를 이해하게 할 때 우리는 세계를 이해하게 하는 것일까요?
      tags: ['철학', '언어']
      link: 'https://www.gutenberg.org/ebooks/5740'

    - title: 소요유
      author: 장자
      quote: 대붕은 바람을 타고 구만 리를 날아오릅니다. 인간이 AI를 빌려 도구를 잘 활용하고 보이지 않는 바람을 타면, 우리도 높이 날아오를 수 있을까요? 이러한 인간-AI 협업이 바로 현대의 소요유일지도 모릅니다.
      tags: ['철학', '인간-AI 협업']

    - title: 제1원리
      author: Elon Musk / 고대 그리스 철학
      quote: 문제를 가장 기본적인 수준으로 돌아가 생각하세요. 하지만 AI 시대에 제1원리를 이해하지 못한 채 AI를 사용하면 표면에만 머물 수밖에 없습니다. 그런데—우리는 정말 본질을 파악해야 할까요? 아니면 표면으로 충분할까요?
      tags: ['사고 방법', '철학']

    - title: 광전 효과와 양자 도약
      author: Albert Einstein
      year: '1905'
      quote: 광전 효과는 빛의 주파수가 전자 방출 여부를 결정하고 강도는 수량만 결정한다고 가르칩니다. 인간의 능력은 주파수이고 AI는 강도입니다. 충분한 주파수(기본 능력, 사고력)가 없으면 인간이 AI를 제약하는 병목이 될 수 있습니다.
      tags: ['물리학 비유', '인간-AI 협업']

    - title: 최소 제곱법과 GPT
      author: 수학 원리
      quote: 최소 제곱법은 최적 적합 곡선을 찾고, GPT는 가능도를 최대화하여 최적의 다음 단어를 찾습니다. 둘 다 본질적으로 고차원 공간에서 최적의 해를 찾는 것이지만 GPT의 공간은 전례 없는 규모입니다.
      tags: ['수학', '기술 원리']

    - title: '엔트로피와 지능: 지능은 압축'
      author: 정보 이론 관점
      quote: Shannon의 정보 엔트로피 이론은 지능이 본질적으로 세계의 압축임을 시사합니다. 언어 모델은 데이터 분포를 학습하여 정보를 압축하며, 예측 능력이 강할수록 압축률이 높고 지능 수준이 높습니다.
      tags: ['정보 이론', '지능의 본질']
      link: 'https://arxiv.org/abs/2407.06645'

    - title: '마틴 파울러: AI가 소프트웨어를 재편'
      author: Martin Fowler
      year: '2024'
      quote: AI는 요구사항 수집, 설계, 코딩, 테스트에서 배포에 이르기까지 소프트웨어 개발의 모든 측면을 변화시키고 있습니다. 소프트웨어 공학의 모범 사례를 재고하고 AI 네이티브 개발 패러다임을 수용해야 합니다.
      tags: ['소프트웨어 공학', '산업 변혁']

    - title: UI는 PreAI
      author: 업계 관점
      year: '2025'
      quote: 전통적인 UI는 인간을 위해 설계되었지만 AI 시대에는 자연어가 최고의 인터페이스일 수 있습니다.
      tags: ['UI/UX', '트렌드']

    - title: 'Anthropic: AI의 노동 시장 영향'
      author: Anthropic Research
      year: '2024'
      quote: 고용에 대한 AI의 실제 영향은 여전히 이론적 잠재력보다 훨씬 낮으며, 아직 체계적인 실업률 상승을 초래하지 않았습니다.
      tags: ['노동력', '산업']
      link: 'https://www.anthropic.com/research/labor-market-impacts'

    - title: 큰 일이 일어나고 있다
      author: Matt Shumer
      year: '2026-02-09'
      quote: 2026년 2월 9일, 6년 경력의 AI 업계 종사자가 썼습니다 - GPT-4에서 Claude Sonnet 4.5로, 단일 모델에서 다중 에이전트 시스템으로, 도구 호출에서 자율 행동으로. 여러 신호가 우리가 AI 능력 도약의 전야에 있음을 나타냅니다. 이것은 예측이 아니라 이미 일어나고 있는 사실입니다.
      tags: ['트렌드', '예측']
      link: 'https://shumer.dev/something-big-is-happening'

    - title: 쓴 교훈
      author: Rich Sutton
      year: '2019'
      quote: 70년의 AI 연구는 계산을 활용하는 일반적인 방법이 결국 인간 지식을 이긴다는 것을 가르쳐줍니다. 인간 지식을 시스템에 하드코딩하려고 하지 말고 검색과 학습을 통해 지식을 발견하는 일반적인 방법을 구축해야 합니다.
      tags: ['방법론', 'AI 역사']
      link: 'http://www.incompleteideas.net/IncIdeas/BitterLesson.html'

    - title: 언어 모델은 적은 샷 학습자
      author: OpenAI (GPT-3 논문)
      year: '2020'
      quote: 대규모 언어 모델은 놀라운 적은 샷 학습 능력을 보여줍니다. 그래디언트 업데이트나 미세 조정 없이도 텍스트 상호 작용과 예제만으로 다양한 작업을 완료할 수 있습니다.
      tags: ['기술 통찰', '적은 샷 학습']
      link: 'https://arxiv.org/abs/2005.14165'

    - title: 추상 누출 법칙
      author: Joel Spolsky
      year: '2002'
      quote: 모든 중요한 추상화 메커니즘은 어느 정도 누출됩니다. LLM을 "지능"의 추상화로 취급할 때 그 누출은 무엇일까요? 우리가 이 추상화에 과도하게 의존하고 있을까요? 추상화가 누출될 때—AI가 실패하거나 환각을 보이거나 통제를 잃을 때—우리는 어떻게 해야 할까요?
      tags: ['소프트웨어 공학', '추상화']
      link: 'https://www.joelonsoftware.com/2002/11/11/the-law-of-leaky-abstractions/'

    - title: 토큰과 화폐
      author: 개념 비유
      quote: 토큰은 AI 세계의 기본 측정 단위입니다. 화폐 시스템이 가치를 정량화하여 경제 운영을 가능하게 하는 것처럼, 토큰은 정보를 정량화하여 AI 경제학을 구축합니다 - API 호출은 토큰으로 청구되고 모델 능력은 토큰 창으로 측정되며, 토큰은 컴퓨팅, 데이터, 지능을 연결하는 가치 앵커가 됩니다.
      tags: ['경제학', '개념']

    - title: '앤드류 응: Agentic Workflow는 엄청난 가치'
      author: Andrew Ng
      year: '2024'
      quote: LLM은 끝이 아니며 Agentic Workflow가 핵심입니다. AI가 인간처럼 반복적으로 작업하도록 하는 것—생각하고, 행동하고, 성찰하고, 개선하는 것—AI의 효과를 여러 배로 높일 수 있습니다.
      tags: ['워크플로', '에이전트']
      link: 'https://www.deeplearning.ai/the-batch/how-agents-can-improve-llm-performance/'

    - title: Bash만 있으면 충분하다
      author: Thariq Shihipar (Anthropic)
      year: '2025'
      quote: Agent를 위해 수천 개의 전용 API를 설계하는 대신, 터미널 접근 권한을 부여하는 것이 더 효과적입니다. Bash와 파일 시스템의 조합은 완전한 범용 컴퓨팅 기능을 구성합니다. 이는 OpenClaw 아키텍처의 핵심 철학이자, 현대 에이전트 프로그래밍 도구들이 TUI(터미널 사용자 인터페이스)를 광범위하게 채택하는 근본적인 이유일 수 있습니다.
      tags: ['기술 아키텍처', '에이전트']
      link: 'https://www.reddit.com/r/ClaudeAI/comments/1q4yig7/claude_agent_sdk_full_workshop_thariq_shihipar/'

    - title: 'Anthropic 개발 프로세스: 더 이상 PRD 필요 없음'
      author: Anthropic Team
      year: '2025'
      quote: 우리 엔지니어링 팀은 더 이상 전통적인 PRD 문서를 작성하지 않습니다. Claude와 직접 대화하고 요구 사항을 설명하고 설계를 반복하고 코드를 생성합니다. 아이디어에서 프로토타입까지의 시간이 10배 줄었습니다.
      tags: ['개발 프로세스', '산업 실무']
      link: 'https://www.youtube.com/watch?v=julbw1JuAz0'

    - title: 'TDD: 테스트 주도 개발'
      author: 소프트웨어 공학 방법론
      quote: AI 시대의 TDD는 본질로 회귀—프로세스가 아닌 결과를 설명합니다. 테스트는 사양이 되고, 선언은 구현이 됩니다. 콩을 뿌려 군사를 만들듯, 말로 실현하듯.
      tags: ['개발 방법론', 'TDD']

    - title: 'AI 중심: 데이터 + 워크플로'
      author: 업계 트렌드
      year: '2025'
      quote: 데이터 중심에서 AI 중심으로의 전환. AI를 기존 시스템에 임베드하는 것이 아니라 AI를 중심으로 데이터 아키텍처와 워크플로를 재설계하는 것입니다. 이것은 패러다임 전환입니다.
      tags: ['아키텍처', '패러다임 전환']

    - title: 100조 토큰 데이터 기반 AI 현황 보고서
      author: OpenRouter & a16z
      year: '2025-12'
      quote: 롤플레이(Roleplay)와 프로그래밍은 현재 AI 구현에서 가장 핵심적이고 점착성이 높은 두 가지 실전 영역입니다. 프로그래밍 토큰 비율은 2025년 초 11%에서 50% 이상으로 급증했습니다.
      tags: ['데이터', '현황 분석']
      link: 'https://openrouter.ai/state-of-ai'

    - title: 2028 글로벌 지능 위기
      author: Citrini Research (James van Geelen & Alap Shah)
      year: '2026-02-22'
      quote: 2026년 2월 22일, Citrini Research 보고서 - AI가 현재 속도로 발전한다면 2028년 글로벌 "지능 위기"가 나타날 수 있습니다. 실업률 10.2%, S&P 500 38% 폭락 전망. 대규모 지식 근로 자동화, 사회 구조 재편, 인간이 일과 가치를 재정의해야 합니다.
      tags: ['미래', '사회적 영향']
      link: 'https://www.citriniresearch.com/p/2028gic'

